                    <div class="stat-card"><div class="stat-value">${userTracks.length}</div><div class="stat-label">Треков</div></div>
                    <div class="stat-card"><div class="stat-value">${totalPlays}</div><div class="stat-label">Прослушиваний</div></div>
                    <div class="stat-card"><div class="stat-value">${totalLikes}</div><div class="stat-label">Лайков</div></div>
                </div>
            `;
            
            // Проверяем, приватный ли профиль
            if (artistUser.isPrivate && artistUser.username !== user.username) {
                html += `
                    <div class="empty-state">
                        <p>🔒 Этот профиль приватный</p>
                        <p>Доступны только общедоступные треки</p>
                    </div>
                `;
                
                // Показываем только публичные треки
                const publicTracks = userTracks.filter(t => !t.isPrivate);
                if (publicTracks.length > 0) {
                    html += `
                        <div class="section-title">🎵 Публичные треки</div>
                        ${renderTracksList(publicTracks)}
                    `;
                }
            } else {
                // Показываем все треки
                if (userTracks.length > 0) {
                    html += `
                        <div class="section-title">🎵 Треки</div>
                        ${renderTracksList(userTracks)}
                    `;
                }
                
                // Показываем плейлисты
                if (userPlaylists.length > 0) {
                    html += `
                        <div class="section-title">🎶 Плейлисты</div>
                        <div class="tracks-list">
                            ${userPlaylists.map(p => {
                                const playlistTracks = p.trackIds.map(id => tracks.find(t => t.id === id)).filter(Boolean);
                                const totalPlays = playlistTracks.reduce((s, t) => s + (t.plays || 0), 0);
                                
                                return `
                                    <div class="track-item" onclick="playPlaylistForUser('${username}', '${p.id}')">
                                        <div class="track-info">
                                            <div class="track-cover">🎵</div>
                                            <div class="track-details">
                                                <h3>${p.name}</h3>
                                                <p>${playlistTracks.length} треков • ${totalPlays} прослушиваний</p>
                                            </div>
                                        </div>
                                        <div class="track-actions">
                                            <div class="track-stats">
                                                <span><i class="fas fa-play"></i> ${totalPlays}</span>
                                                <span><i class="fas fa-music"></i> ${playlistTracks.length}</span>
                                            </div>
                                            <button class="btn btn-secondary" onclick="event.stopPropagation(); showPlaylistDetailsForUser('${username}', '${p.id}')">
                                                <i class="fas fa-eye"></i>
                                            </button>
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    `;
                }
            }
            
            content.innerHTML = html;
        }

        function getSubscriptionTypeForUser(userObj) {
            if (!userObj) return 'guest';
            if (userObj.subscription?.type === 'premium') return 'premium';
            if (userObj.subscription?.type === 'pro') return 'pro';
            if (userObj.subscription?.type === 'trial' && userObj.subscription.daysLeft > 0) return 'trial';
            return 'free';
        }

        function playPlaylistForUser(username, playlistId) {
            // Для проигрывания плейлиста другого пользователя
            // Нужно сначала загрузить его данные
            getUser(username).then(artistUser => {
                if (!artistUser) return;
                
                const playlist = artistUser.playlists?.find(p => p.id === playlistId);
                if (playlist && playlist.trackIds.length > 0) {
                    queue = [...playlist.trackIds];
                    playFromQueue(0);
                }
            });
        }

        function showPlaylistDetailsForUser(username, playlistId) {
            getUser(username).then(artistUser => {
                if (!artistUser) return;
                
                const playlist = artistUser.playlists?.find(p => p.id === playlistId);
                if (!playlist) return;
                
                const playlistTracks = playlist.trackIds.map(id => tracks.find(t => t.id === id)).filter(Boolean);
                
                let html = `
                    <div class="content-header">
                        <h2>${playlist.name} — ${artistUser.username}</h2>
                        <button class="btn btn-secondary" onclick="showUserProfile('${username}')">Назад</button>
                    </div>
                    
                    <div class="stats-grid">
                        <div class="stat-card"><div class="stat-value">${playlistTracks.length}</div><div class="stat-label">Треков</div></div>
                        <div class="stat-card"><div class="stat-value">${playlistTracks.reduce((s, t) => s + (t.plays || 0), 0)}</div><div class="stat-label">Прослушиваний</div></div>
                    </div>
                    
                    <div class="section-title">Треки</div>
                    ${renderTracksList(playlistTracks)}
                `;
                
                document.getElementById('content').innerHTML = html;
            });
        }

        // ========== ПОИСК ==========
        function performGlobalSearch() {
            if (!user) {
                alert('Войдите чтобы использовать поиск');
                return;
            }
            
            const query = document.getElementById('globalSearchInput').value.trim().toLowerCase();
            if (!query) {
                alert('Введите запрос для поиска');
                return;
            }
            
            // Поиск по названию, исполнителю и жанру
            const results = tracks.filter(t => {
                const title = (t.title || '').toLowerCase();
                const artist = (t.artist || '').toLowerCase();
                const genre = (t.genre || '').toLowerCase();
                
                return title.includes(query) || artist.includes(query) || genre.includes(query);
            });
            
            // Отображаем результаты на главной странице
            const content = document.getElementById('content');
            const popular = [...tracks].sort((a, b) => (b.plays || 0) - (a.plays || 0)).slice(0, 6);
            const newest = [...tracks].sort((a, b) => new Date(b.uploadDate || 0) - new Date(a.uploadDate || 0)).slice(0, 6);
            
            let html = `
                <div class="content-header">
                    <h2>Главная</h2>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <input type="text" id="globalSearchInput" placeholder="Поиск по трекам и исполнителям..." style="flex: 1; min-width: 200px; padding: 8px; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 4px; color: var(--text-primary);">
                        <button class="btn btn-secondary" onclick="performGlobalSearch()">🔍</button>
                    </div>
                </div>
                
                <div class="section-title">🔎 Результаты поиска (${results.length})</div>
                ${results.length > 0 ? renderTracksList(results) : '<div class="empty-state">Ничего не найдено</div>'}
                
                <div class="section-title">🔥 Популярное</div>
                <div class="tracks-grid">
                    ${popular.map(t => `
                        <div class="track-card" onclick="playTrack(${tracks.indexOf(t)})">
                            <div class="track-card-cover">${t.title.charAt(0)}</div>
                            <h4>${t.title}</h4>
                            <p onclick="event.stopPropagation(); goToArtistProfile('${t.artist}')" style="cursor: pointer; color: var(--accent-color);">${t.artist}</p>
                            <div class="track-card-stats">
                                <span><i class="fas fa-play"></i> ${t.plays || 0}</span>
                                <span><i class="fas fa-heart"></i> ${t.likes || 0}</span>
                            </div>
                        </div>
                    `).join('')}
                </div>
                
                <div class="section-title">✨ Новинки</div>
                <div class="tracks-grid">
                    ${newest.map(t => `
                        <div class="track-card" onclick="playTrack(${tracks.indexOf(t)})">
                            <div class="track-card-cover">${t.title.charAt(0)}</div>
                            <h4>${t.title}</h4>
                            <p onclick="event.stopPropagation(); goToArtistProfile('${t.artist}')" style="cursor: pointer; color: var(--accent-color);">${t.artist}</p>
                            <div class="track-card-stats">
                                <span>${new Date(t.uploadDate).toLocaleDateString()}</span>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
            
            content.innerHTML = html;
        }

        // ========== МЕДИАТЕКА ==========
        function renderLibrary(container) {
            if (!user) {
                container.innerHTML = '<div class="empty-state">Войдите чтобы увидеть медиатеку</div>';
                return;
            }
            
            const liked = tracks.filter(t => user.likedTracks?.includes(t.id));
            const saved = tracks.filter(t => user.savedTracks?.includes(t.id));
            
            let html = `
                <div class="content-header"><h2>Медиатека</h2></div>
                
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-value">${liked.length}</div><div class="stat-label">Любимые</div></div>
                    <div class="stat-card"><div class="stat-value">${saved.length}</div><div class="stat-label">Сохраненные</div></div>
                </div>
                
                <div class="section-title">❤️ Любимые треки</div>
                ${renderTracksList(liked)}
                
                <div class="section-title">📥 Сохраненные треки</div>
                ${renderTracksList(saved)}
                
                <div class="section-title">🎵 Плейлисты</div>
                ${renderPlaylists()}
            `;
            
            container.innerHTML = html;
        }

        function renderPlaylists() {
            if (!user?.playlists || user.playlists.length === 0) {
                return `
                    <div class="empty-state">
                        <p>Плейлистов пока нет</p>
                        <button class="btn btn-primary" onclick="createPlaylistPrompt()">Создать первый</button>
                    </div>
                `;
            }
            
            return `
                <div class="tracks-list">
                    ${user.playlists.map(p => {
                        const playlistTracks = p.trackIds.map(id => tracks.find(t => t.id === id)).filter(Boolean);
                        const totalPlays = playlistTracks.reduce((s, t) => s + (t.plays || 0), 0);
                        
                        return `
                            <div class="track-item" onclick="playPlaylist('${p.id}')">
                                <div class="track-info">
                                    <div class="track-cover">🎵</div>
                                    <div class="track-details">
                                        <h3>${p.name}</h3>
                                        <p>${playlistTracks.length} треков • ${totalPlays} прослушиваний</p>
                                    </div>
                                </div>
                                <div class="track-actions">
                                    <div class="track-stats">
                                        <span><i class="fas fa-play"></i> ${totalPlays}</span>
                                        <span><i class="fas fa-music"></i> ${playlistTracks.length}</span>
                                    </div>
                                    <button class="btn btn-secondary" onclick="event.stopPropagation(); showPlaylistDetails('${p.id}')">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                    <button class="btn btn-danger" onclick="event.stopPropagation(); deletePlaylist('${p.id}')">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }

        function createPlaylistPrompt() {
            if (!user) return;
            const name = prompt('Введите название плейлиста:');
            if (name && name.trim()) {
                createPlaylist(name.trim());
            }
        }

        function showPlaylistDetails(playlistId) {
            if (!user) return;
            const playlist = user.playlists?.find(p => p.id === playlistId);
            if (!playlist) return;
            
            const playlistTracks = playlist.trackIds.map(id => tracks.find(t => t.id === id)).filter(Boolean);
            
            let html = `
                <div class="content-header">
                    <h2>${playlist.name}</h2>
                    <button class="btn btn-secondary" onclick="renderPage('library')">Назад</button>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-value">${playlistTracks.length}</div><div class="stat-label">Треков</div></div>
                    <div class="stat-card"><div class="stat-value">${playlistTracks.reduce((s, t) => s + (t.plays || 0), 0)}</div><div class="stat-label">Прослушиваний</div></div>
                </div>
                
                <div class="section-title">Треки</div>
                ${renderTracksList(playlistTracks)}
            `;
            
            document.getElementById('content').innerHTML = html;
        }

        // ========== ПРОФИЛЬ ==========
        function renderProfile(container) {
            if (!user) {
                container.innerHTML = '<div class="empty-state">Войдите чтобы увидеть профиль</div>';
                return;
            }
            
            const userTracks = tracks.filter(t => t.uploadedBy === user.username);
            const totalPlays = userTracks.reduce((s, t) => s + (t.plays || 0), 0);
            const totalLikes = userTracks.reduce((s, t) => s + (t.likes || 0), 0);
            
            const chartData = userTracks.slice(0, 5).map(t => ({
                title: t.title.substring(0, 15),
                plays: t.plays || 0
            }));
            
            const maxPlays = Math.max(...chartData.map(d => d.plays), 1);
            
            let html = `
                <div class="content-header">
                    <h2>Профиль</h2>
                    <button class="btn btn-secondary" onclick="showAvatarModal()">
                        <i class="fas fa-camera"></i> Аватар
                    </button>
                </div>
                
                <div style="display: flex; gap: 20px; align-items: center; margin-bottom: 20px;">
                    <div class="current-avatar">${user.avatar || '👤'}</div>
                    <div>
                        <h3>${user.username}</h3>
                        <p style="color: var(--text-secondary);">Тариф: ${getSubscriptionType()} • Загрузок: ${user.uploadedTracks?.length || 0}/${getUploadLimit()}</p>
                    </div>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-value">${userTracks.length}</div><div class="stat-label">Треков</div></div>
                    <div class="stat-card"><div class="stat-value">${totalPlays}</div><div class="stat-label">Прослушиваний</div></div>
                    <div class="stat-card"><div class="stat-value">${totalLikes}</div><div class="stat-label">Лайков</div></div>
                </div>
                
                <div class="section-title">📊 Статистика</div>
                <div class="chart-container">
                    ${chartData.map(d => `
                        <div class="chart-bar">
                            <span class="chart-bar-label">${d.title}</span>
                            <div style="flex: 1;">
                                <div class="chart-bar-fill" style="width: ${(d.plays / maxPlays) * 100}%"></div>
                            </div>
                            <span class="chart-bar-value">${d.plays}</span>
                        </div>
                    `).join('')}
                    ${chartData.length === 0 ? '<p style="color: var(--text-secondary);">Нет данных для графика</p>' : ''}
                </div>
                
                <div class="section-title">🎵 Мои треки</div>
                ${renderTracksList(userTracks)}
            `;
            
            container.innerHTML = html;
        }

        // ========== ОТОБРАЖЕНИЕ ТРЕКОВ ==========
        function renderTracksList(tracksArray) {
            if (!tracksArray || tracksArray.length === 0) {
                return '<div class="empty-state">Пока нет треков</div>';
            }
            
            return `
                <div class="tracks-list">
                    ${tracksArray.map(t => {
                        const globalIndex = tracks.findIndex(t2 => t2.id === t.id);
                        const isLiked = user?.likedTracks?.includes(t.id);
                        const isSaved = user?.savedTracks?.includes(t.id);
                        
                        return `
                            <div class="track-item ${currentTrackIndex === globalIndex ? 'playing' : ''}" onclick="playTrack(${globalIndex})">
                                <div class="track-info">
                                    <div class="track-cover">${t.title.charAt(0)}</div>
                                    <div class="track-details">
                                        <h3>${t.title}</h3>
                                        <p>${t.artist}</p>
                                    </div>
                                </div>
                                <div class="track-actions">
                                    <div class="track-stats">
                                        <span><i class="fas fa-play"></i> ${t.plays || 0}</span>
                                        <span><i class="fas fa-heart"></i> ${t.likes || 0}</span>
                                    </div>
                                    <button class="like-btn ${isLiked ? 'liked' : ''}" onclick="event.stopPropagation(); toggleLike('${t.id}')">
                                        <i class="fas fa-heart"></i>
                                    </button>
                                    <button class="add-btn ${isSaved ? 'added' : ''}" onclick="event.stopPropagation(); toggleSave('${t.id}')">
                                        ${isSaved ? '✓' : '+'}
                                    </button>
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }

        // ========== ПОИСК И ФИЛЬТРЫ ==========
        let searchQuery = '';
        let searchType = 'title'; // 'title', 'artist', 'genre'
        let sortType = 'plays'; // 'plays', 'likes', 'date', 'title'
        let sortDirection = 'desc'; // 'asc', 'desc'

        function renderSearchAndFilters(container) {
            const html = `
                <div class="content-header">
                    <h2>Поиск и фильтры</h2>
                </div>
                
                <div style="display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;">
                    <input type="text" id="searchInput" placeholder="Поиск..." style="flex: 1; min-width: 200px; padding: 8px; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 4px; color: var(--text-primary);">
                    
                    <select id="searchType" style="padding: 8px; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 4px; color: var(--text-primary);">
                        <option value="title">По названию</option>
                        <option value="artist">По исполнителю</option>
                        <option value="genre">По жанру</option>
                    </select>
                    
                    <select id="sortType" style="padding: 8px; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 4px; color: var(--text-primary);">
                        <option value="plays">По прослушиваниям</option>
                        <option value="likes">По лайкам</option>
                        <option value="date">По дате</option>
                        <option value="title">По названию</option>
                    </select>
                    
                    <select id="sortDirection" style="padding: 8px; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 4px; color: var(--text-primary);">
                        <option value="desc">Убывание</option>
                        <option value="asc">Возрастание</option>
                    </select>
                    
                    <button class="btn btn-secondary" onclick="applyFilters()">Применить</button>
                    <button class="btn btn-secondary" onclick="clearFilters()">Сбросить</button>
                </div>
            `;
            
            container.innerHTML = html;
            
            // Устанавливаем текущие значения
            document.getElementById('searchInput').value = searchQuery;
            document.getElementById('searchType').value = searchType;
            document.getElementById('sortType').value = sortType;
            document.getElementById('sortDirection').value = sortDirection;
        }

        function applyFilters() {
            searchQuery = document.getElementById('searchInput').value.trim().toLowerCase();
            searchType = document.getElementById('searchType').value;
            sortType = document.getElementById('sortType').value;
            sortDirection = document.getElementById('sortDirection').value;
            
            renderPage(currentPage);
        }

        function clearFilters() {
            searchQuery = '';
            searchType = 'title';
            sortType = 'plays';
            sortDirection = 'desc';
            
            renderPage(currentPage);
        }

        function filterAndSortTracks(tracksArray) {
            let filtered = [...tracksArray];
            
            // Поиск
            if (searchQuery) {
                filtered = filtered.filter(t => {
                    const value = t[searchType]?.toLowerCase() || '';
                    return value.includes(searchQuery);
                });
            }
            
            // Сортировка
            filtered.sort((a, b) => {
                let aVal, bVal;
                
                if (sortType === 'plays') {
                    aVal = a.plays || 0;
                    bVal = b.plays || 0;
                } else if (sortType === 'likes') {
                    aVal = a.likes || 0;
                    bVal = b.likes || 0;
                } else if (sortType === 'date') {
                    aVal = new Date(a.uploadDate || 0).getTime();
                    bVal = new Date(b.uploadDate || 0).getTime();
                } else if (sortType === 'title') {
                    aVal = a.title.toLowerCase();
                    bVal = b.title.toLowerCase();
                }
                
                if (sortDirection === 'asc') {
                    return aVal > bVal ? 1 : -1;
                } else {
                    return aVal < bVal ? 1 : -1;
                }
            });
            
            return filtered;
        }

        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        async function init() {
            try {
                await initDB();
                await getTracks();
                
                // Восстановление сессии после перезагрузки
                const saved = localStorage.getItem('currentUser');
                if (saved) {
                    const data = JSON.parse(saved);
                    user = await getUser(data.username);
                    if (user) {
                        document.getElementById('authModal').classList.remove('active');
                        document.getElementById('logoutBtn').style.display = 'block';
                        if (user.theme) applyTheme(user.theme);
                        updateUserDisplay();
                    }
                }
                
                if (!user) document.getElementById('authModal').classList.add('active');
                
                // Восстанавливаем режим повтора
                restoreRepeatMode();
                
                renderPage('home');
            } catch (error) {
                console.error('Init error:', error);
            }
        }

        init();
    </script>
</body>
</html>
